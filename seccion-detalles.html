        // Clase para manejar la animación de secuencia de imágenes
        class SecuenciaAnimada {
            constructor(contenedor, imagenes, intervaloMs = 600) {
                this.contenedor = contenedor;
                this.imagenes = imagenes;
                this.intervaloMs = intervaloMs;
                this.indiceActual = 0;
                this.intervalId = null;
                this.imgElement = null;
            }

            iniciar() {
                this.imgElement = document.createElement('img');
                this.imgElement.className = 'secuencia-imagen';
                this.imgElement.alt = 'Secuencia de modelo 3D';
                this.imgElement.style.width = '100%';
                this.imgElement.style.display = 'block';
                this.imgElement.style.borderRadius = '24px';
                
                this.contenedor.innerHTML = '';
                this.contenedor.appendChild(this.imgElement);
                this.cargarImagen(this.indiceActual);
                
                this.intervalId = setInterval(() => {
                    this.siguienteImagen();
                }, this.intervaloMs);
            }

            cargarImagen(indice) {
                if (this.imgElement && this.imagenes[indice]) {
                    this.imgElement.src = this.imagenes[indice];
                }
            }

            siguienteImagen() {
                this.indiceActual = (this.indiceActual + 1) % this.imagenes.length;
                this.cargarImagen(this.indiceActual);
            }

            detener() {
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                    this.intervalId = null;
                }
            }
        }

        // ========== TEXTO CONCEPTUAL DE ADASCUA (para Fuego interior) ==========
        const textoAdascua = `¿Quién estás en adascua?

Para nosotros, el ser humano es una colección de múltiples etapas y estados; somos el resultado de una secuencia de nosotros mismos, de nuestras fases buenas y malas, pero en conjunto constituimos una única identidad.

La "sombra" representa aquello de lo que nos escondemos, aquello que no queremos afrontar o que permanece en nuestros pensamientos más profundos, a los que rara vez se les da voz. Es aquello que existe, pero que evitamos mirar directamente.

"Ascuas" es un proyecto cuya idea principal se basa en el concepto de quemar y dejar atrás. El fuego se entiende como aquello que nos mueve, que nos ilumina y nos transforma. El objetivo del proyecto es aprender a aceptarlo como parte fundamental del proceso humano.

La sombra no somos nosotros; es aquello que se esconde del fuego, aquello que solo se hace visible cuando es iluminado por él. En este sentido, el fuego se asocia con la vida y la conciencia, mientras que la sombra representa los traumas, miedos y experiencias no resueltas.

Se trata de un espacio mutante. El programa pretende vincular directamente la arquitectura con el proceso vital del ser humano. Se busca reunir al mayor número posible de personas con necesidades de apoyo psicológico y terapéutico. Una vez el edificio alcance su capacidad, el proyecto comienza su funcionamiento activo: un espacio destinado a terapias, tanto grupales como individuales, al encuentro, a la convivencia y a la vida compartida. No es únicamente un espacio de tránsito, sino también un lugar de estancia e internamiento.

A medida que las personas avanzan en su proceso de sanación, van dejando atrás partes de sí mismas, conciliándose con sus "yos" pasados y dando paso a una nueva identidad. De forma paralela, el edificio también se transforma.

Por cada proceso de sanación, el proyecto "se quema", entendiendo este acto como una metáfora de transformación. Sin embargo, este proceso no es destructivo en sentido negativo: al igual que el ser humano, que puede destruirse para reconstruirse, el edificio se autoregenera. De esta forma, tras cada "quema", surge una nueva arquitectura desde lo anterior, simbolizando el nacimiento de un nuevo yo.

Las reparaciones se materializan como parches o reconstrucciones, mientras que las "destrucciones" se interpretan como la acción del fuego simbólico que hace desaparecer partes del cerramiento, permitiendo que el edificio evolucione. Así, el proyecto se plantea como un sistema vivo en constante transformación, cuyo objetivo final es acompañar y potenciar los procesos de sanación del mayor número posible de personas.`;

Se plantea un tratamiento adaptativo, un programa que no finaliza hasta que cada persona pueda reunirse con su propio yo. Este proceso está directamente vinculado a la mutación completa del edificio, entendida como una transformación continua, similar a la metamorfosis de una mariposa.

Por cada persona que es ayudada, el edificio va mutando. Este proceso no se detiene hasta alcanzar su estado final de proyecto. En este sentido, el espacio no se concibe únicamente como un entorno terapéutico pasajero, sino como un sistema activo, vivo y evolutivo.

El conjunto está preparado para desempeñar también un rol psiquiátrico, permitiendo el internamiento de personas que se encuentren en situaciones que lo requieran, adaptándose así a distintos niveles de necesidad y tratamiento.

Implantación, estética y relación con el entorno

        // Iniciar la animación de secuencia
        function iniciarSecuenciaSiAplica(proyectoId) {
            if (animacionActual) {
                animacionActual.detener();
                animacionActual = null;
            }
            
            const data = dataPartes[proyectoId];
            if (data && data.principal.tipo === 'secuencia') {
                const contenedor = document.getElementById('secuenciaContenedor');
                if (contenedor) {
                    animacionActual = new SecuenciaAnimada(contenedor, data.principal.imagenes, 600);
                    animacionActual.iniciar();
                }
            }

        // Iniciar observador de scroll para el texto y las imágenes de galería
        function iniciarObservadores() {
            // Observador para el texto
            const textoContainer = document.querySelector('.texto-poetico-container');
            if (textoContainer) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.2 });
                observer.observe(textoContainer);
            }
            
            // Observador para las imágenes de la galería
            const gridItems = document.querySelectorAll('.grid-item');
            if (gridItems.length > 0) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });
                gridItems.forEach(item => observer.observe(item));
            }
        }

            if (proyecto && dataPartes[proyecto]) {
                return proyecto;
            }
            return 'vortex';
        }

        // ========== RENDERIZAR CONTENIDO ==========

            iniciarSecuenciaSiAplica(proyectoId);
            iniciarObservadores();
            
            // Actualizar estilos de los botones activos
            document.querySelectorAll('.opcion-texto').forEach(btn => {
                btn.style.background = 'linear-gradient(135deg, #e0e0e0 0%, #888888 100%)';

                btn.style.color = 'transparent';
            });
            
            const btnActivo = document.querySelector(`.opcion-texto[data-proyecto="${proyectoId}"]`);
            if (btnActivo) {
                btnActivo.style.background = 'linear-gradient(135deg, #FFFFFF 0%, #cccccc 100%)';
                btnActivo.style.backgroundClip = 'text';
                btnActivo.style.webkitBackgroundClip = 'text';
                btnActivo.style.color = 'transparent';
            }
        }

        // ========== CAPTURAR CLICS PARA NO RECARGAR (excluyendo enlaces externos y PDF) ==========
        document.querySelectorAll('.opcion-texto').forEach(enlace => {
            const href = enlace.getAttribute('href');
            
            // Si es un enlace externo (http, https) o un PDF, NO interceptar
            if (href && (href.startsWith('http://') || href.startsWith('https://') || href.includes('.pdf'))) {
                return;  // Dejar que funcione normalmente
            }
            
            enlace.addEventListener('click', (e) => {
                e.preventDefault();
                const proyecto = enlace.getAttribute('data-proyecto');
                if (proyecto) {
                    const nuevaURL = `${window.location.pathname}?proyecto=${proyecto}`;
                    window.history.pushState({}, '', nuevaURL);
                    renderizar(proyecto);
                }
            });
        });
        
        // Manejar navegación con botones atrás/adelante
        window.addEventListener('popstate', () => {
            const proyecto = obtenerProyectoDeURL();

        // Inicializar
